events {
  worker_connections 1024;
}

http {
  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|woff2?|svg|gif|png|jpg|jpeg)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
